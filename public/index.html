<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Actors</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      .sticky-topbar {
        position: sticky;
        top: 0;
        z-index: 1020;
      }
      #busy {
        display: none;
      }
      td code {
        font-size: 0.85em;
      }
      pre#events {
        max-height: 220px;
        overflow: auto;
      }
    </style>
    <link rel="icon" href="data:," />
  </head>
  <body class="bg-body-tertiary">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-topbar mb-4">
      <div class="container">
        <a class="navbar-brand" href="/ui/">Actors</a>
        <div class="d-flex">
          <a class="btn btn-outline-light btn-sm" href="/auth/logout">Logout</a>
        </div>
      </div>
    </nav>

    <main class="container">
      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <div class="row g-2 align-items-center">
            <div class="col-sm-6 col-md-5 col-lg-4">
              <label for="q" class="form-label mb-1">Last name starts with…</label>
              <input id="q" class="form-control" placeholder="e.g. GUI" />
            </div>
            <div class="col-auto">
              <button id="load" class="btn btn-primary mt-4">Search</button>
              <span id="busy" class="align-middle ms-2" aria-live="polite">
                <span
                  class="spinner-border spinner-border-sm"
                  role="status"
                  aria-hidden="true"
                ></span>
                <span class="ms-1">Loading…</span>
              </span>
            </div>
            <div class="col ms-auto text-end">
              <a href="/ui/edit.html" class="btn btn-success">Create new</a>
            </div>
          </div>
        </div>
      </div>

      <div class="card shadow-sm mb-4">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table id="tbl" class="table table-striped table-hover mb-0 align-middle">
              <thead class="table-light">
                <tr>
                  <th>ID</th>
                  <th>First</th>
                  <th>Last</th>
                  <th>Updated</th>
                  <th></th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>

    </main>

    <script>
      const API = '/api/actors';
      const busy = document.getElementById('busy');
      const tbody = document.querySelector('#tbl tbody');

      function formatDate(dateString) {
        if (!dateString) return '';
        const date = new Date(dateString);
        if (isNaN(date)) return dateString;

        const options = {
          year: 'numeric',
          month: 'long',
          day: 'numeric',
          hour: 'numeric',
          minute: '2-digit',
          hour12: true
        };

        return date.toLocaleDateString('en-US', options);
      }

      async function load() {
        busy.style.display = 'inline';
        const searchTerm = document.getElementById('q').value.trim();
        const params = new URLSearchParams();

        // Build the query object with filtering and sorting
        const queryObj = {};
        if (searchTerm) {
          queryObj.lastName = { $like: searchTerm + '%' };
        }
        queryObj.$orderby = { lastName: 1, firstName: 1 };

        params.set('q', JSON.stringify(queryObj));
        const res = await fetch(API + '?' + params.toString());
        const data = await res.json();
        const rows = data.items || data.data || [];
        tbody.innerHTML = rows
          .map(
            (r) => `
    <tr>
      <td>${r.actorId}</td>
      <td>${r.firstName}</td>
      <td>${r.lastName}</td>
      <td>${formatDate(r.lastUpdate)}</td>
      <td><a href="/ui/edit.html?id=${r.actorId}">Edit</a></td>
    </tr>`
          )
          .join('');
        busy.style.display = 'none';
      }

      document.getElementById('load').addEventListener('click', load);
      load();

    </script>
  </body>
</html>
